# Server
server.port=8080
server.address=0.0.0.0

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/locality_db
spring.datasource.username=postgres
spring.datasource.password=1026344372
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=locality-app-super-secret-key-change-this-in-production-must-be-long-enough
app.jwt.expiration=86400000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# Admin bootstrap (first run only)
app.admin.phone=9999999999
app.admin.password=admin123
app.admin.name=Admin

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
